
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accessible Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button onclick="toggleTheme()">Dark/Light Mode</button>]
  
  <button onclick="decreaseText()">A-</button>
<button onclick="resetText()">A</button>
<button onclick="increaseText()">A+</button>
  
<h1>Personal Details</h1>

<div class="container">

  <label for="name">Name:</label>
  <input id="name" type="text">

  <label for="dob">Date of Birth:</label>
  <input id="dob" type="date">

  <label for="kin">Next of Kin:</label>
  <input id="kin" type="text">

  <label for="address">Address:</label>
  <input id="address" type="text">

</div>

<div class="buttons">
  <button onclick="validateForm()">Save</button>
  <button onclick="enableEdit()">Edit</button>
  <button onclick="readAloud()">Read Aloud</button>
 <button onclick="findUser()">Find My Details</button>
</div>
 
<button onclick="stopReadAloud()">Stop Reading</button>
  
  <div id="errorBox" style="color: red; margin-top: 10px;"></div>
<div id="messageBox" class="message"></div>

<script src="script.js"></script>
  
</body>
</html>
